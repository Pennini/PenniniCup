{% extends "base.html" %}

{% block title %}Erro Interno{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl py-12 sm:py-16">
    <article class="rounded-2xl border border-purple-500/30 bg-neutral-900/90 p-6 sm:p-8 shadow-xl shadow-black/20">
        <p class="text-[11px] uppercase tracking-[0.2em] text-purple-300/90">Erro 500</p>
        <h1 class="mt-2 text-2xl sm:text-3xl font-semibold">Algo deu errado no servidor</h1>
        <p class="mt-3 text-sm sm:text-base text-neutral-300">
            Já registramos esse erro e vamos corrigir o mais rápido possível. Tente novamente em instantes.
        </p>

        <div class="mt-6 flex flex-wrap gap-3">
            <a href="{% url 'penninicup:index' %}" class="px-4 py-2.5 rounded-lg bg-orange-500 text-black font-semibold hover:bg-orange-400 transition-colors">Ir para a home</a>
            <button type="button" onclick="location.reload()" class="px-4 py-2.5 rounded-lg border border-neutral-600 text-neutral-200 hover:border-orange-500/60 hover:text-orange-200 transition-colors">Tentar novamente</button>
        </div>
    </article>
</section>
{% endblock %}
