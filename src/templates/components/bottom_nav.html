{% with request.resolver_match.view_name as current_view %}
<nav class="bottom-nav fixed bottom-0 left-0 right-0 border-t lg:hidden z-50">
    <div class="flex justify-around h-16">
        <a
            href="{% url 'penninicup:index' %}"
            class="nav-link flex flex-col items-center justify-center text-xs {% if current_view == 'penninicup:index' %}nav-link-active{% else %}text-neutral-400{% endif %}"
            {%
            if
            current_view=""
            ="penninicup:index"
            %}aria-current="page"
            {%
            endif
            %}
        >
            <i data-lucide="house" class="w-4 h-4"></i>
            <span>Início</span>
        </a>

        {% if user.is_authenticated %}
        <a
            href="{% url 'football:matches' %}"
            class="nav-link flex flex-col items-center justify-center text-xs {% if current_view == 'football:matches' %}nav-link-active{% else %}text-neutral-400{% endif %}"
            {%
            if
            current_view=""
            ="football:matches"
            %}aria-current="page"
            {%
            endif
            %}
        >
            <i data-lucide="award" class="w-4 h-4"></i>
            <span>Partidas</span>
        </a>

        <a
            href="{% url 'penninicup:rules' %}"
            class="nav-link flex flex-col items-center justify-center text-xs {% if current_view == 'penninicup:rules' %}nav-link-active{% else %}text-neutral-400{% endif %}"
            {%
            if
            current_view=""
            ="penninicup:rules"
            %}aria-current="page"
            {%
            endif
            %}
        >
            <i data-lucide="book-open" class="w-4 h-4"></i>
            <span>Regras</span>
        </a>

        <a
            href="{% url 'pool:list' %}"
            class="nav-link flex flex-col items-center justify-center text-xs {% if current_view == 'pool:list' or current_view == 'pool:detail' %}nav-link-active{% else %}text-neutral-400{% endif %}"
            {%
            if
            current_view=""
            ="pool:list"
            %}aria-current="page"
            {%
            endif
            %}
        >
            <i data-lucide="trophy" class="w-4 h-4"></i>
            <span>Boloes</span>
        </a>

        <a
            href="#"
            class="nav-link flex flex-col items-center justify-center text-xs {% if current_view == 'profile:view' %}nav-link-active{% else %}text-neutral-400{% endif %}"
            {%
            if
            current_view=""
            ="profile:view"
            %}aria-current="page"
            {%
            endif
            %}
        >
            <i data-lucide="user-round" class="w-4 h-4"></i>
            <span>Perfil</span>
        </a>
        {% else %}
        <a
            href="{% url 'accounts:login' %}"
            class="nav-link flex flex-col items-center justify-center text-xs text-neutral-400"
        >
            <i data-lucide="lock" class="w-4 h-4"></i>
            <span>Entrar</span>
        </a>
        {% endif %}
    </div>
</nav>
{% endwith %}
