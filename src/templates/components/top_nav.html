{% load static %}
<nav class="max-lg:hidden flex items-center h-16 px-6 border-b bg-white">
    <!-- Left -->
    <div class="flex items-center gap-4">
        <!-- Team Dropdown -->
        <div class="relative group">
            <a href="{% url 'penninicup:index' %}" class="flex items-center gap-2 px-3 py-2 rounded-md cursor:pointer">
                <img src="{% static 'img/logo_penninicup.png' %}" class="h-6 w-6 rounded" />
                <span class="font-medium">PenniniCup</span>
            </a>
        </div>

        <!-- Links -->
        {% with request.resolver_match.view_name as current_view %}
        <div class="flex gap-4 ml-4 h-full">
            <a
                href="{% url 'penninicup:index' %}"
                class="flex items-center h-16 px-1 border-b-2 -mb-[1px] transition-colors {% if current_view == 'penninicup:index' %}border-blue-600 text-gray-900{% else %}border-transparent text-gray-600 hover:text-gray-900 hover:border-gray-300{% endif %}"
            >
                Home
            </a>
            <a
                href="#"
                class="flex items-center h-16 px-1 border-b-2 -mb-[1px] transition-colors {% if current_view == 'events:list' %}border-blue-600 text-gray-900{% else %}border-transparent text-gray-600 hover:text-gray-900 hover:border-gray-300{% endif %}"
            >
                Events
            </a>
            <a
                href="#"
                class="flex items-center h-16 px-1 border-b-2 -mb-[1px] transition-colors {% if current_view == 'orders:list' %}border-blue-600 text-gray-900{% else %}border-transparent text-gray-600 hover:text-gray-900 hover:border-gray-300{% endif %}"
            >
                Orders
            </a>
        </div>
        {% endwith %}
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    {% if user.is_authenticated %}
    <!-- Right -->
    <div class="flex items-center gap-3">
        <!-- Profile Dropdown -->
        <div class="relative group">
            <button class="rounded-md overflow-hidden">
                <img src="/static/img/profile.jpg" class="h-8 w-8 object-cover" />
            </button>

            <div class="absolute right-0 mt-2 w-64 bg-white border rounded-lg shadow-lg hidden group-hover:block z-50">
                <a href="#" class="block px-4 py-2 hover:bg-gray-50">👤 My profile</a>

                <div class="border-t my-1"></div>

                <a href="{% url 'accounts:logout' %}" class="block px-4 py-2 hover:bg-gray-50 text-red-600">
                    🚪 Sign out
                </a>
            </div>
        </div>
    </div>
    {% else %}
    <div>
        <a href="{% url 'accounts:login' %}" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
            Entrar
        </a>
        <a
            href="{% url 'accounts:register' %}"
            class="ml-2 px-4 py-2 bg-gray-200 text-gray-900 rounded-md hover:bg-gray-300"
        >
            Cadastrar
        </a>
    </div>
    {% endif %}
</nav>
