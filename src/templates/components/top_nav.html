{% load static %}
<nav class="max-lg:hidden app-navbar top-nav flex items-center h-16 px-6 gap-4">
    <!-- Left -->
    <div class="flex items-center gap-4">
        <!-- Team Dropdown -->
        <div class="relative group">
            <a href="{% url 'penninicup:index' %}" class="flex items-center gap-2 px-3 py-2 rounded-md cursor:pointer">
                <img src="{% static 'img/logo_penninicup.png' %}" class="h-6 w-6 rounded" />
                <span class="font-medium">PenniniCup</span>
            </a>
        </div>

        <!-- Links -->
        {% with request.resolver_match.view_name as current_view %}
        <div class="flex gap-4 ml-4 h-full">
            <a
                href="{% url 'penninicup:index' %}"
                class="nav-link flex items-center h-16 px-3 border-b-2 -mb-[1px] transition-colors {% if current_view == 'penninicup:index' %}nav-link-active{% endif %}"
                {%
                if
                current_view=""
                ="penninicup:index"
                %}aria-current="page"
                {%
                endif
                %}
            >
                Home
            </a>
            <a
                href="#"
                class="nav-link flex items-center h-16 px-3 border-b-2 -mb-[1px] transition-colors {% if current_view == 'events:list' %}nav-link-active{% endif %}"
                {%
                if
                current_view=""
                ="events:list"
                %}aria-current="page"
                {%
                endif
                %}
            >
                Events
            </a>
        </div>
        {% endwith %}
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    {% if user.is_authenticated %}
    <!-- Right -->
    <div class="flex items-center gap-3">
        <!-- Profile Dropdown -->
        <div class="relative group">
            <button class="rounded-md overflow-hidden hover:ring-2 hover:ring-orange-500 transition">
                <img src="/static/img/profile.jpg" class="h-8 w-8 object-cover" />
            </button>

            <div
                class="absolute right-0 mt-2 w-64 bg-neutral-800 border border-neutral-700 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
            >
                <a
                    href="#"
                    class="block px-4 py-2 text-neutral-300 hover:bg-neutral-700 hover:text-orange-500 transition rounded-t-lg"
                >
                    👤 Meu perfil
                </a>

                <div class="border-t border-neutral-700"></div>

                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button
                        type="submit"
                        class="w-full text-left px-4 py-2 text-red-400 hover:bg-neutral-700 hover:text-red-300 transition rounded-b-lg"
                    >
                        🚪 Sair
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% else %}
    <div class="flex items-center">
        <a href="{% url 'accounts:login' %}" class="nav-action px-4 py-2"> Entrar </a>
    </div>
    {% endif %}
</nav>
