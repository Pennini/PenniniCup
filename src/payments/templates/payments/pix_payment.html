{% extends "pages/actions.html" %} {% block title %}PenniniCup - Pagamento PIX{% endblock %} {% block extra_head %}
<script src="https://sdk.mercadopago.com/js/v2"></script>
{% endblock extra_head %} {% block content %}
<div id="paymentBrick_container"></div>

<script>
    const mp = new MercadoPago('{{ public_key }}', {
    locale: 'pt-BR'
    });
    const bricksBuilder = mp.bricks();
    const renderPaymentBrick = async (bricksBuilder) => {
        const settings = {
        initialization: {
            /*
            "amount" é a quantia total a pagar por todos os meios de pagamento com exceção da Conta Mercado Pago e Parcelas sem cartão de crédito, que têm seus valores de processamento determinados no backend através do "preferenceId"
            }
            */
            amount: {{ amount }},
            preferenceId: "{{ preference_id }}",
            payer: {
            email: "{{ payer_email }}",
            },
        },
        customization: {
            visual: {
            style: {
                theme: "dark",
            },
            },
            paymentMethods: {
            : "all",
                                bankTransfer: "all",
                                ticket: "all",
                                debitCard: "all",
            maxInstallments: 1
            },
        },
        callbacks: {
            onReady: () => {
            /*
                Callback chamado quando o Brick está pronto.
                Aqui, você pode ocultar seu site, por exemplo.
            */
            },
            onSubmit: ({ selectedPaymentMethod, formData }) => {
            // callback chamado quando há click no botão de envio de dados
            return new Promise((resolve, reject) => {
                fetch("/process_payment", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(formData),
                })
                .then((response) => response.json())
                .then((response) => {
                    // receber o resultado do pagamento
                    resolve();
                })
                .catch((error) => {
                    // manejar a resposta de erro ao tentar criar um pagamento
                    reject();
                });
            });
            },
            onError: (error) => {
            // callback chamado para todos os casos de erro do Brick
            console.error(error);
            },
        },
        };
        window.paymentBrickController = await bricksBuilder.create(
        "payment",
        "paymentBrick_container",
        settings
        );
    };
    renderPaymentBrick(bricksBuilder);
</script>

{% endblock content %} {% block footer_info %}
<p class="mt-6 text-center text-sm text-neutral-400 flex items-center justify-center gap-1">
    <i data-lucide="shield-check" class="w-4 h-4"></i>
    Pagamento seguro via Mercado Pago
</p>
{% endblock footer_info %}
