{% extends "pages/actions.html" %} {% block title %}PenniniCup — Autenticação{% endblock title %} {% block content %}
<!-- Tabs -->
<div class="grid grid-cols-2 -mt-6 -mx-6 mb-6">
    <a
        href="{% url 'accounts:login' %}"
        class="py-3 text-center font-medium border-b-2 {% if request.resolver_match.url_name == 'login' %}border-orange-500 text-white{% else %}border-transparent text-neutral-400 hover:text-neutral-300{% endif %} transition-colors"
    >
        Entrar
    </a>
    <a
        href="{% url 'accounts:register' %}"
        class="py-3 text-center font-medium border-b-2 {% if request.resolver_match.url_name == 'register' %}border-orange-500 text-white{% else %}border-transparent text-neutral-400 hover:text-neutral-300{% endif %} transition-colors"
    >
        Cadastrar
    </a>
</div>

<!-- Messages -->
{% if messages %}
<div class="mb-4 space-y-2">
    {% for message in messages %}
    <div
        class="rounded-md p-3 text-sm {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% elif message.tags == 'success' %}bg-green-500/10 text-green-400 border border-green-500/20{% else %}bg-blue-500/10 text-blue-400 border border-blue-500/20{% endif %}"
    >
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

<!-- Auth Content -->
{% block auth_content %}{% endblock %} {% endblock content %}
