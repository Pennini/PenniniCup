<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>{% block page_title %}PenniniCup — Login{% endblock %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        {% load static tailwind_tags %} {% tailwind_css %}

        <script src="https://unpkg.com/lucide@latest"></script>
    </head>

    <body class="min-h-screen flex items-center justify-center bg-neutral-950 p-4 text-white">
        <div class="w-full max-w-md">
            <!-- Logo / Header -->
            <div class="text-center mb-8">
                <a href="{% url 'penninicup:index' %}" class="inline-block">
                    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-orange-500">
                        <i data-lucide="trophy" class="w-8 h-8 text-black"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-orange-500">PenniniCup</h1>
                </a>
                <p class="text-neutral-400 mt-2">Bolão da Copa do Mundo 2026</p>
            </div>

            <!-- Card -->
            <div class="rounded-xl border border-neutral-800 bg-neutral-900/80 backdrop-blur">
                <!-- Tabs -->
                <div class="grid grid-cols-2">
                    <a
                        href="{% url 'accounts:login' %}"
                        class="py-3 text-center font-medium border-b-2 {% if request.resolver_match.url_name == 'login' %}border-orange-500 text-white{% else %}border-transparent text-neutral-400{% endif %}"
                    >
                        Entrar
                    </a>
                    <a
                        href="{% url 'accounts:register' %}"
                        class="py-3 text-center font-medium border-b-2 {% if request.resolver_match.url_name == 'register' %}border-orange-500 text-white{% else %}border-transparent text-neutral-400{% endif %}"
                    >
                        Cadastrar
                    </a>
                </div>

                <!-- Content -->
                <div class="p-6">
                    {% if messages %}
                    <div class="mb-4 space-y-2">
                        {% for message in messages %}
                        <div
                            class="rounded-md p-3 text-sm {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% elif message.tags == 'success' %}bg-green-500/10 text-green-400 border border-green-500/20{% else %}bg-blue-500/10 text-blue-400 border border-blue-500/20{% endif %}"
                        >
                            {{ message }}
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %} {% block auth_content %}{% endblock %}
                </div>
            </div>

            <p class="mt-6 text-center text-sm text-neutral-400">🔒 Acesso exclusivo para membros convidados</p>
        </div>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
