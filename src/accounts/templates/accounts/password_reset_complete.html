{% extends "accounts/auth.html" %} {% block page_title %}PenniniCup — Senha Alterada{% endblock %} {% block
auth_content %}
<div class="text-center space-y-4">
    <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-green-500/10">
        <i data-lucide="check-circle" class="w-10 h-10 text-green-500"></i>
    </div>

    <h2 class="text-2xl font-bold text-white">Senha Alterada!</h2>

    <p class="text-neutral-300">
        Sua senha foi redefinida com sucesso.<br />
        Agora você pode fazer login com sua nova senha.
    </p>

    <div class="pt-4">
        <a
            href="{% url 'accounts:login' %}"
            class="inline-block rounded-md bg-orange-500 px-6 py-2 font-semibold text-black hover:bg-orange-400 transition"
        >
            Fazer Login
        </a>
    </div>
</div>
{% endblock auth_content %}
